kind = "web"
previewPath = "/"
title = "HireForge AI"
version = "1.0.0"
id = "artifacts/hireforge-ai"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20708

[services.development]
run = "pnpm --filter @workspace/hireforge-ai run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/hireforge-ai", "run", "build" ]
publicDir = "artifacts/hireforge-ai/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20708"
BASE_PATH = "/"
